<!DOCTYPE html>
<html lang="en" class="bg-white text-black">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Article Repository</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {} } }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; }
    @media (max-width: 639px) { .container { padding-left: 0.75rem; padding-right: 0.75rem; } }
    .view-btn.active { background: #000; color: #fff; }
    .skeleton { background: #e5e5e5; animation: pulse 1.5s infinite; border-radius: 2px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .detail-overlay { background: rgba(0,0,0,0.5); }
    [data-view] { display: none; }
    [data-view].active { display: block; }
  </style>
</head>
<body class="antialiased">
  <app-shell></app-shell>

  <script type="module" src="/app.js"></script>
</body>
</html>
